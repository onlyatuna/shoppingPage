name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # ⚠️ 這裡直接寫死全小寫，避免 ${{ github.repository }} 帶入大寫導致報錯
  IMAGE_TAG: ghcr.io/onlyatuna/shoppingpage:latest
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # --- Job 0: 安全性稽核 ---
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run npm audit (Backend)
        working-directory: ./apps/backend
        run: npm audit --audit-level=high

  # --- Job 1: 建置並推送 Docker Image ---
  build-and-push:
    needs: security-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # [修正 1] 啟用 Docker Buildx (解決 Cache export 錯誤)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # [修正 2] 使用全小寫名稱推送到 GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Job 2: 部署到 EC2 ---
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4

      # 👇 [新增步驟] 將 EC2 生產機加入 known_hosts 避免連線錯誤
      - name: Add EC2 host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # 👇 [新增步驟] 將 docker-compose.yml 複製到伺服器
      - name: Copy docker-compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,Caddyfile"
          target: "~/shop-app/"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # 👇 [修正] 移除了 cache-from/to (這些是無效參數)
          # 這裡只保留超時設定
          timeout: 60s
          command_timeout: 30m
          
          script: |
            # 1. 登入 GHCR (使用 stdin 避免密碼出現在進程列表)
            mkdir -p ~/shop-app
            cd ~/shop-app || exit 1
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            # 2. 拉取最新 Image
            docker pull "${{ env.IMAGE_TAG }}"
            
            # 3. 進入目錄 (已調整至上方)
            # 4. 產生 .env (使用 cat << 'EOF' 確保安全，避免 Secrets 在 ps aux 中洩漏)
            # 4. Generate .env safely
            DB_BASE_URL="${{ secrets.DATABASE_URL }}"
            DB_URL_POOL="${DB_BASE_URL}$([[ "$DB_BASE_URL" == *\?* ]] && echo "&" || echo "?")connection_limit=5&pool_timeout=15"
            echo "DATABASE_URL=$DB_URL_POOL" > .env
            cat << 'EOF' >> .env
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            LINE_PAY_CHANNEL_ID=${{ secrets.LINE_PAY_CHANNEL_ID }}
            LINE_PAY_CHANNEL_SECRET=${{ secrets.LINE_PAY_CHANNEL_SECRET }}
            SMTP_HOST=${{ secrets.SMTP_HOST }}
            SMTP_USER=${{ secrets.SMTP_USER }}
            SMTP_PASS=${{ secrets.SMTP_PASS }}
            FRONTEND_URL=${{ secrets.FRONTEND_URL }}
            NODE_ENV=production
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            IG_ACCESS_TOKEN=${{ secrets.IG_ACCESS_TOKEN }}
            IG_USER_ID=${{ secrets.IG_USER_ID }}
            DEEPL_API_KEY=${{ secrets.DEEPL_API_KEY }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            LINE_PAY_API_URL=${{ secrets.LINE_PAY_API_URL }}
            LINE_PAY_RETURN_HOST=${{ secrets.LINE_PAY_RETURN_HOST }}
            LINE_PAY_RETURN_CONFIRM_URL=${{ secrets.LINE_PAY_RETURN_CONFIRM_URL }}
            LINE_PAY_RETURN_CANCEL_URL=${{ secrets.LINE_PAY_RETURN_CANCEL_URL }}
            EOF
            
            # 5. 重啟服務
            # [優化] 使用 --remove-orphans 清理過期容器，使用 --wait 確保容器啟動成功 (需對應 healthcheck)
            IMAGE_TAG=${{ env.IMAGE_TAG }} docker compose up -d --force-recreate --remove-orphans

            # 6. 清理舊的 Image 避免硬碟爆滿
            docker image prune -f
