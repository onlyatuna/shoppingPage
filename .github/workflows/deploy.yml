name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # ⚠️ 這裡直接寫死全小寫，避免 ${{ github.repository }} 帶入大寫導致報錯
  IMAGE_TAG: ghcr.io/onlyatuna/shoppingpage:latest
  # 強制使用 Node.js 24 執行 actions 避免 Deprecation Warning (需為字串)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # --- Job 0: 安全性稽核 ---
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run npm audit (Backend)
        working-directory: ./apps/backend
        run: npm audit --audit-level=high

  # --- Job 1: 建置並推送 Docker Image ---
  build-and-push:
    needs: security-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # [修正 1] 啟用 Docker Buildx (解決 Cache export 錯誤)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # [修正 2] 使用全小寫名稱推送到 GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Job 2: 部署到 GCP GCE ---
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4

      - name: Add GCP host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.GCP_PROD_HOST }} >> ~/.ssh/known_hosts

      - name: Copy docker-compose file to GCP
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.GCP_PROD_HOST }}
          username: ${{ secrets.GCP_PROD_USERNAME }}
          key: ${{ secrets.GCP_PROD_SSH_KEY }}
          source: "docker-compose.yml,Caddyfile"
          target: "~/shop-app/"

      - name: Deploy to GCP via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.GCP_PROD_HOST }}
          username: ${{ secrets.GCP_PROD_USERNAME }}
          key: ${{ secrets.GCP_PROD_SSH_KEY }}
          timeout: 60s
          command_timeout: 30m
          # 將 Secrets 作為環境變數傳入，避免在 script 裡拼字串導致 Escape 問題
          envs: DATABASE_PASSWORD,JWT_SECRET,GEMINI_API_KEY,CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET,FRONTEND_URL,PORT,NODE_ENV,IG_USER_ID,IG_ACCESS_TOKEN,DEEPL_API_KEY,LINE_PAY_CHANNEL_ID,LINE_PAY_CHANNEL_SECRET,LINE_PAY_API_URL,LINE_PAY_RETURN_HOST,LINE_PAY_RETURN_CONFIRM_URL,LINE_PAY_RETURN_CANCEL_URL,SMTP_HOST,SMTP_USER,SMTP_PASS
          script: |
            cd ~/shop-app || exit 1
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            # 2. 生成 .env 檔案 (使用 envs 安全注入)
            printf "DATABASE_URL=mysql://root:${DATABASE_PASSWORD}@db:3306/shop_db\n" > .env
            printf "DATABASE_PASSWORD=${DATABASE_PASSWORD}\n" >> .env
            printf "JWT_SECRET=${JWT_SECRET}\n" >> .env
            printf "GEMINI_API_KEY=${GEMINI_API_KEY}\n" >> .env
            printf "CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}\n" >> .env
            printf "CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}\n" >> .env
            printf "CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}\n" >> .env
            printf "FRONTEND_URL=${FRONTEND_URL}\n" >> .env
            printf "PORT=${PORT}\n" >> .env
            printf "NODE_ENV=${NODE_ENV}\n" >> .env
            printf "IG_USER_ID=${IG_USER_ID}\n" >> .env
            printf "IG_ACCESS_TOKEN=${IG_ACCESS_TOKEN}\n" >> .env
            printf "DEEPL_API_KEY=${DEEPL_API_KEY}\n" >> .env
            printf "LINE_PAY_CHANNEL_ID=${LINE_PAY_CHANNEL_ID}\n" >> .env
            printf "LINE_PAY_CHANNEL_SECRET=${LINE_PAY_CHANNEL_SECRET}\n" >> .env
            printf "LINE_PAY_API_URL=${LINE_PAY_API_URL}\n" >> .env
            printf "LINE_PAY_RETURN_HOST=${LINE_PAY_RETURN_HOST}\n" >> .env
            printf "LINE_PAY_RETURN_CONFIRM_URL=${LINE_PAY_RETURN_CONFIRM_URL}\n" >> .env
            printf "LINE_PAY_RETURN_CANCEL_URL=${LINE_PAY_RETURN_CANCEL_URL}\n" >> .env
            printf "SMTP_HOST=${SMTP_HOST}\n" >> .env
            printf "SMTP_USER=${SMTP_USER}\n" >> .env
            printf "SMTP_PASS=${SMTP_PASS}\n" >> .env
            
            # 3. 拉取最新 Image
            docker pull "${{ env.IMAGE_TAG }}"
            
            # 4. 部署策略 (1GB RAM 小主機 — 無法同時跑 2 個 App 容器)
            # 直接重建 app 容器。Caddy 配有 health_uri，會在新容器就緒後自動導流。
            # 停機時間 ≈ 容器啟動 + DB 遷移 + 健康檢查通過的時間 (約 30-60 秒)
            IMAGE_TAG=${{ env.IMAGE_TAG }} DATABASE_PASSWORD=$DATABASE_PASSWORD docker compose up -d --no-deps --force-recreate app
            
            # 等待容器通過健康檢查
            echo "Waiting for app container to become healthy..."
            MAX_WAIT=120
            ELAPSED=0
            while [ $ELAPSED -lt $MAX_WAIT ]; do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q app) 2>/dev/null || echo "starting")
              echo "  [$ELAPSED s] Container health: $STATUS"
              if [ "$STATUS" = "healthy" ]; then
                echo "✅ App container is healthy!"
                break
              fi
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done
            
            if [ "$STATUS" != "healthy" ]; then
              echo "⚠️ Container did not become healthy within ${MAX_WAIT}s. Checking logs..."
              docker compose logs --tail=30 app
            fi
            
            # 5. Reload Caddy 以重新發現後端 (即使失敗也不中斷)
            docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile || true
            
            # 6. 清理舊 Image 釋放磁碟空間
            docker image prune -f
        env:
          DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          PORT: ${{ secrets.PORT }}
          NODE_ENV: ${{ secrets.NODE_ENV }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          LINE_PAY_CHANNEL_ID: ${{ secrets.LINE_PAY_CHANNEL_ID }}
          LINE_PAY_CHANNEL_SECRET: ${{ secrets.LINE_PAY_CHANNEL_SECRET }}
          LINE_PAY_API_URL: ${{ secrets.LINE_PAY_API_URL }}
          LINE_PAY_RETURN_HOST: ${{ secrets.LINE_PAY_RETURN_HOST }}
          LINE_PAY_RETURN_CONFIRM_URL: ${{ secrets.LINE_PAY_RETURN_CONFIRM_URL }}
          LINE_PAY_RETURN_CANCEL_URL: ${{ secrets.LINE_PAY_RETURN_CANCEL_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
