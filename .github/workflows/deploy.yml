name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # ⚠️ 這裡直接寫死全小寫，避免 ${{ github.repository }} 帶入大寫導致報錯
  IMAGE_TAG: ghcr.io/onlyatuna/shoppingpage:latest
  # 強制使用 Node.js 24 執行 actions 避免 Deprecation Warning (需為字串)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # --- Job 0: 安全性稽核 ---
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run npm audit (Backend)
        working-directory: ./apps/backend
        run: npm audit --audit-level=high

  # --- Job 1: 建置並推送 Docker Image ---
  build-and-push:
    needs: security-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # [修正 1] 啟用 Docker Buildx (解決 Cache export 錯誤)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # [修正 2] 使用全小寫名稱推送到 GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Job 2: 部署到 GCP GCE ---
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4

      # 👇 [新增步驟] 將 GCP 生產機加入 known_hosts 避免連線錯誤
      - name: Add GCP host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.GCP_PROD_HOST }} >> ~/.ssh/known_hosts

      # 👇 [新增步驟] 將 docker-compose.yml 複製到伺服器
      - name: Copy docker-compose file to GCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_PROD_HOST }}
          username: ${{ secrets.GCP_PROD_USERNAME }}
          key: ${{ secrets.GCP_PROD_SSH_KEY }}
          source: "docker-compose.yml,Caddyfile"
          target: "~/shop-app/"

      - name: Deploy to GCP via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_PROD_HOST }}
          username: ${{ secrets.GCP_PROD_USERNAME }}
          key: ${{ secrets.GCP_PROD_SSH_KEY }}
          timeout: 60s
          command_timeout: 30m
          
          script: |
            # 1. 登入 GHCR
            mkdir -p ~/shop-app/certs
            cd ~/shop-app || exit 1
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            # 2. 拉取最新 Image
            docker pull "${{ env.IMAGE_TAG }}"
            
            # 3. 零停機部署 (Zero Downtime Deployment)
            # 強制重建以確保新的 NODE_OPTIONS 生效
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }} IMAGE_TAG=${{ env.IMAGE_TAG }} docker compose up -d --no-deps --scale app=2 --force-recreate app
            
            # 等待新容器暖機 (Node.js 啟動 + Prisma 連線)
            echo "Waiting for new container to become healthy..."
            sleep 25
            
            # 讓 Caddy 重新掃描後端 IP (確保它抓到新的 Healthy 容器)
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }} IMAGE_TAG=${{ env.IMAGE_TAG }} docker compose exec -T caddy caddy reload
            
            # 縮減回 1 個容器
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }} IMAGE_TAG=${{ env.IMAGE_TAG }} docker compose up -d --no-deps --scale app=1 app
            
            # 清理並保持同步
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }} IMAGE_TAG=${{ env.IMAGE_TAG }} docker compose up -d --remove-orphans

            # 5. 清理舊的 Image
            docker image prune -f
