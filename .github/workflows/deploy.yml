name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # ⚠️ 這裡直接寫死全小寫，避免 ${{ github.repository }} 帶入大寫導致報錯
  IMAGE_TAG: ghcr.io/onlyatuna/shoppingpage:latest
  # 強制使用 Node.js 24 執行 actions 避免 Deprecation Warning (需為字串)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # --- Job 0: 安全性稽核 ---
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Run npm audit (Backend)
        working-directory: ./apps/backend
        run: npm audit --audit-level=high

  # --- Job 1: 建置並推送 Docker Image ---
  build-and-push:
    needs: security-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # [修正 1] 啟用 Docker Buildx (解決 Cache export 錯誤)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # [修正 2] 使用全小寫名稱推送到 GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Job 2: 部署到 GCP GCE ---
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4

      # 👇 [新增步驟] 將 GCP 生產機加入 known_hosts 避免連線錯誤
      - name: Add GCP host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.GCP_PROD_HOST }} >> ~/.ssh/known_hosts

      # 👇 [新增步驟] 將 docker-compose.yml 複製到伺服器
      - name: Copy docker-compose file to GCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.GCP_PROD_HOST }}
          username: ${{ secrets.GCP_PROD_USERNAME }}
          key: ${{ secrets.GCP_PROD_SSH_KEY }}
          source: "docker-compose.yml,Caddyfile"
          target: "~/shop-app/"

      - name: Deploy to GCP via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_PROD_HOST }}
          username: ${{ secrets.GCP_PROD_USERNAME }}
          key: ${{ secrets.GCP_PROD_SSH_KEY }}
          timeout: 60s
          command_timeout: 30m
          
          script: |
            # 1. 登入 GHCR
            mkdir -p ~/shop-app/certs
            cd ~/shop-app || exit 1
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
            
            # 2. 建立/更新 .env 檔案 (從 GitHub Secrets 注入)
            # 這樣你只要在 GitHub 改 Secrets，伺服器就會自動更新
            cat <<EOF > .env
DATABASE_URL=mysql://root:${{ secrets.DATABASE_PASSWORD }}@db:3306/shop_db
DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}
JWT_SECRET=${{ secrets.JWT_SECRET }}
GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
FRONTEND_URL=${{ secrets.FRONTEND_URL }}
PORT=${{ secrets.PORT }}
NODE_ENV=${{ secrets.NODE_ENV }}
IG_USER_ID=${{ secrets.IG_USER_ID }}
IG_ACCESS_TOKEN=${{ secrets.IG_ACCESS_TOKEN }}
DEEPL_API_KEY=${{ secrets.DEEPL_API_KEY }}
LINE_PAY_CHANNEL_ID=${{ secrets.LINE_PAY_CHANNEL_ID }}
LINE_PAY_CHANNEL_SECRET=${{ secrets.LINE_PAY_CHANNEL_SECRET }}
LINE_PAY_API_URL=${{ secrets.LINE_PAY_API_URL }}
LINE_PAY_RETURN_HOST=${{ secrets.LINE_PAY_RETURN_HOST }}
LINE_PAY_RETURN_CONFIRM_URL=${{ secrets.LINE_PAY_RETURN_CONFIRM_URL }}
LINE_PAY_RETURN_CANCEL_URL=${{ secrets.LINE_PAY_RETURN_CANCEL_URL }}
SMTP_HOST=${{ secrets.SMTP_HOST }}
SMTP_USER=${{ secrets.SMTP_USER }}
SMTP_PASS=${{ secrets.SMTP_PASS }}
EOF

            # 3. 拉取最新 Image
            docker pull "${{ env.IMAGE_TAG }}"
            
            # 4. 零停機部署 (Zero Downtime Deployment)
            # 這裡依然傳入 DATABASE_PASSWORD 是為了讓 docker-compose.yml 裡的變數能被解析
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }} IMAGE_TAG=${{ env.IMAGE_TAG }} docker compose up -d --no-deps --scale app=2 --force-recreate app
            
            # 等待新容器暖機
            echo "Waiting for new container to become healthy..."
            sleep 25
            
            # 讓 Caddy 重新載入
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }} IMAGE_TAG=${{ env.IMAGE_TAG }} docker compose exec -T caddy caddy reload
            
            # 縮減回 1 個容器
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }} IMAGE_TAG=${{ env.IMAGE_TAG }} docker compose up -d --no-deps --scale app=1 app
            
            # 清理
            DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }} IMAGE_TAG=${{ env.IMAGE_TAG }} docker compose up -d --remove-orphans

            # 5. 清理舊的 Image
            docker image prune -f
