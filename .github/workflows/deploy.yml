name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # ⚠️ 這裡直接寫死全小寫，避免 ${{ github.repository }} 帶入大寫導致報錯
  IMAGE_TAG: ghcr.io/onlyatuna/shoppingpage:latest

jobs:
  # --- Job 1: 建置並推送 Docker Image ---
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # [修正 1] 啟用 Docker Buildx (解決 Cache export 錯誤)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # [修正 2] 使用全小寫名稱推送到 GHCR
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- Job 2: 部署到 EC2 ---
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - uses: actions/checkout@v4

      # 👇 [新增步驟] 將 docker-compose.yml 複製到伺服器
      - name: Copy docker-compose file to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,Caddyfile"
          target: "~/shop-app/"

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # 👇 [修正] 移除了 cache-from/to (這些是無效參數)
          # 這裡只保留超時設定
          timeout: 60s
          command_timeout: 30m
          
          script: |
            # 1. 登入 GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 2. 拉取最新 Image
            docker pull ghcr.io/onlyatuna/shoppingpage:latest
            
            # 3. 進入目錄
            cd ~/shop-app || exit 1
            
            #此時目錄下應該已經有 scp 過來的 docker-compose.yml 了
            
            # 4. 產生 .env (保持不變)
            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
            echo "LINE_PAY_CHANNEL_ID=${{ secrets.LINE_PAY_CHANNEL_ID }}" >> .env
            echo "LINE_PAY_CHANNEL_SECRET=${{ secrets.LINE_PAY_CHANNEL_SECRET }}" >> .env
            echo "SMTP_HOST=${{ secrets.SMTP_HOST }}" >> .env
            echo "SMTP_USER=${{ secrets.SMTP_USER }}" >> .env
            echo "SMTP_PASS=${{ secrets.SMTP_PASS }}" >> .env
            echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> .env
            echo "NODE_ENV=production" >> .env
            echo "CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}" >> .env
            echo "CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}" >> .env
            echo "CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}" >> .env
            echo "IG_ACCESS_TOKEN=${{ secrets.IG_ACCESS_TOKEN }}" >> .env
            echo "IG_USER_ID=${{ secrets.IG_USER_ID }}" >> .env
            echo "DEEPL_API_KEY=${{ secrets.DEEPL_API_KEY }}" >> .env
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
            
            # [新增] LINE Pay 完整環境變數
            echo "LINE_PAY_API_URL=${{ secrets.LINE_PAY_API_URL }}" >> .env
            echo "LINE_PAY_RETURN_HOST=${{ secrets.LINE_PAY_RETURN_HOST }}" >> .env
            echo "LINE_PAY_RETURN_CONFIRM_URL=${{ secrets.LINE_PAY_RETURN_CONFIRM_URL }}" >> .env
            echo "LINE_PAY_RETURN_CANCEL_URL=${{ secrets.LINE_PAY_RETURN_CANCEL_URL }}" >> .env

            # 5. 重啟服務
            docker compose up -d --force-recreate

            # 6. 資料庫遷移
            sleep 10
            sleep 10
            docker compose exec -T app npx prisma migrate deploy --schema=./apps/backend/prisma/schema.prisma
