services:
  # 👇 [新增] Caddy 服務 (負責 HTTPS)
  caddy:
    image: caddy:latest
    container_name: shopping-caddy
    restart: always
    ports:
      - "80:80" # HTTP (自動轉 HTTPS)
      - "443:443" # HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile # 掛載設定檔
      - ./certs:/etc/caddy/certs # 新增掛載憑證資料夾
      - caddy_data:/data # 持久化憑證
      - caddy_config:/config
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  app:
    # 1. [修正] 改用 GHCR Image (全小寫) 並支援變數覆蓋
    image: ${IMAGE_TAG:-ghcr.io/onlyatuna/shoppingpage:latest}
    restart: always

    # 2. [SECURITY] 內部網路隔離
    expose:
      - "3000"

    # 3. [修正] 環境變數
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql://root:${DATABASE_PASSWORD}@db:3306/shop_db
      - NODE_OPTIONS=--max-old-space-size=384 # 限制 Node 記憶體堆疊 
    depends_on:
      - db

    # 4. [優化] 嚴格資源限制，防止擠壓系統
    deploy:
      resources:
        limits:
          cpus: '0.70'
          memory: 512M # 單個 Node 不應超過 512MB
        reservations:
          memory: 128M

    # 5. [優化] 零停機部署關鍵：縮短健康檢查間隔
    healthcheck:
      # 使用更穩健的 Node.js 請求腳本，確保等待回應後才結束進程
      test: ["CMD-SHELL", "node -e \"const http = require('http'); const req = http.get('http://localhost:3000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => process.exit(1));\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: mysql:8.0
    container_name: shopping-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: shop_db
    volumes:
      - mysql_data:/var/lib/mysql
    # 限制 MySQL 緩衝區，為 1GB 小主機省下空間
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=128M --performance_schema=OFF
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
  caddy_data: # [新增]
  caddy_config: # [新增]
