services:
  # 👇 [新增] Caddy 服務 (負責 HTTPS)
  caddy:
    image: caddy:latest
    container_name: shopping-caddy
    restart: always
    ports:
      - "80:80" # HTTP (自動轉 HTTPS)
      - "443:443" # HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile # 掛載設定檔
      - ./certs:/etc/caddy/certs # 新增掛載憑證資料夾
      - caddy_data:/data # 持久化憑證
      - caddy_config:/config
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
  app:
    # 1. [修正] 改用 GHCR Image (全小寫) 並支援變數覆蓋
    image: ${IMAGE_TAG:-ghcr.io/onlyatuna/shoppingpage:latest}
    restart: always

    # 2. [SECURITY] 內部網路隔離
    expose:
      - "3000"

    # 3. [修正] 讀取 CI/CD 生成的 .env 檔案
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql://root:${DATABASE_PASSWORD:-Qq940628}@db:3306/shop_db
    depends_on:
      - db

    # 4. [保留] 資源限制
    deploy:
      resources:
        limits:
          cpus: '0.80'
          memory: 1G

    # 5. [優化] 零停機部署關鍵：縮短健康檢查間隔
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/health', (r) => {if (r.statusCode !== 200) process.exit(1);})\"" ]
      interval: 5s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: mysql:8.0
    container_name: shopping-db
    restart: always
    environment:
      # 5. [修正] 密碼改用變數 (會自動讀取 .env 中的 DATABASE_PASSWORD)
      # 為了相容您原本的 .env 生成腳本，我們稍後需確認 .env 有沒有這個變數
      # 如果沒有，暫時寫死也可以，但建議用變數
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD:-Qq940628}
      MYSQL_DATABASE: shop_db
    volumes:
      - mysql_data:/var/lib/mysql
      # 加入這個設定以優化 MySQL 記憶體使用 (對小機器很重要)
    command: --default-authentication-plugin=mysql_native_password --innodb-buffer-pool-size=256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
  caddy_data: # [新增]
  caddy_config: # [新增]
